services:
  postgres:
    image: postgres:17
    container_name: newsdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsdesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Required}
      POSTGRES_DB: ${POSTGRES_DB:-newsdesk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-newsdesk} -d ${POSTGRES_DB:-newsdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - newsdesk-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: newsdesk-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-newsdesk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-newsdesk}
      OLLAMA_HOST: http://host.docker.internal:11434
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - newsdesk-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: newsdesk-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    networks:
      - newsdesk-net

volumes:
  postgres_data:
    name: newsdesk-postgres-data

networks:
  newsdesk-net:
    name: newsdesk-network
    driver: bridge
